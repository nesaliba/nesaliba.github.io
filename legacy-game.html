<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Simulation | Scitriad</title>
    <link rel="icon" href="icons/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Prevents double scrollbars */
        }
        
        .legacy-header {
            background-color: var(--primary-dark);
            color: white;
            padding: 1rem;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .legacy-header h1 {
            font-size: 1.5rem;
            margin: 0;
        }

        .legacy-badge {
            background: #f59e0b; /* Amber */
            color: #000;
            font-size: 0.8rem;
            font-weight: 800;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            margin-left: 10px;
            text-transform: uppercase;
        }

        .back-btn {
            position: absolute;
            left: 1.5rem;
            color: white;
            text-decoration: none;
            font-weight: 600;
            background: rgba(255,255,255,0.2);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .back-btn:hover { background: rgba(255,255,255,0.3); }

        .iframe-container {
            flex: 1;
            width: 100%;
            background-color: #232323; /* Dark background to match Unity loading screens */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <!-- Modern Navbar -->
    <site-navbar></site-navbar>

    <header class="legacy-header">
        <a href="index.html" class="back-btn" id="back-link">← Back</a>
        <h1 id="game-title">Loading Simulation...</h1>
        <span class="legacy-badge">Classic</span>
    </header>

    <!-- The Iframe that isolates the Unity Game -->
    <div class="iframe-container">
        <iframe id="game-iframe" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/firebase-init.js"></script>
    <script type="module" src="js/auth-modal.js"></script>
    <script src="js/navbar.js"></script>
    
    <script type="module">
        import { GamesCatalog } from './js/games-catalog.js';

        // Get the game ID from the URL
        const params = new URLSearchParams(window.location.search);
        const gameId = params.get('id');
        
        const gameDef = GamesCatalog.find(g => g.id === gameId);

        // Validate it's a legacy game
        if (!gameDef || gameDef.type !== 'unity-legacy') {
            window.location.href = 'index.html'; // Redirect if invalid
        } else {
            // Apply themes and set iframe source
            document.title = `${gameDef.title} | Scitriad Classic`;
            document.body.classList.add(`theme-${gameDef.subject}`);
            
            document.getElementById('game-title').innerText = gameDef.title;
            
            // Set dynamic back button based on subject
            const backLink = document.getElementById('back-link');
            backLink.href = `${gameDef.subject.charAt(0).toUpperCase() + gameDef.subject.slice(1)}.html`;

            // Load the unity index.html into the iframe
            document.getElementById('game-iframe').src = gameDef.path;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying Login | Scitriad</title>
    <link rel="icon" href="icons/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .verify-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
            background-color: var(--bg-light);
        }
        .verify-card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
        }
        #verify-spinner { margin-bottom: 1.5rem; }
        #verify-email-form { display: none; margin-top: 1.5rem; text-align: left; }
    </style>
</head>
<body>
    <div class="verify-container">
        <div class="verify-card">
            <img src="Scitriad.png" alt="Scitriad Logo" style="height: 60px; margin-bottom: 1.5rem; border-radius: 6px;">
            <div id="verify-spinner" class="auth-spinner"></div>
            <h2 id="verify-title" style="color: var(--primary-dark);">Verifying Login...</h2>
            <p id="verify-desc" style="color: var(--text-dark); margin-top: 1rem; line-height: 1.5;">Please wait while we securely authenticate your session.</p>

            <div id="verify-email-form">
                <p style="font-size: 0.95rem; margin-bottom: 0.5rem; font-weight: 600;">Confirm your email to continue:</p>
                <input type="email" id="manual-email" class="auth-input" placeholder="student@example.com" />
                <button id="submit-manual-email" class="auth-btn-primary">Verify</button>
            </div>
        </div>
    </div>
    
    <script type="module" src="js/firebase-init.js"></script>
    <script type="module" src="js/auth-verify.js"></script>
</body>
</html>
